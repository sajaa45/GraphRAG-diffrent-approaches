services:
  neo4j:
    image: neo4j:5.15-community
    container_name: neo4j-knowledge-graph
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/Lexical12345
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "Lexical12345", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  parse-pdf:
    build: .
    container_name: pdf-parser
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: python sections_parser_pdf.py /app/input/saudi-aramco-ara-2024-english.pdf --output /app/output/parsed_sections.json

  vector-store:
    build: .
    container_name: vector-store-builder
    volumes:
      - ./:/app/input
      - ./output:/app/output
      - ./chroma_db:/app/chroma_db
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: python chunking_vectorestore_pipeline.py /app/output/parsed_sections.json --collection financial_docs --db-path /app/chroma_db

  multi-relation-kg:
    build: .
    container_name: multi-relation-kg-builder
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./:/app/input
      - ./output:/app/output
      - ./chroma_db:/app/chroma_db
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=mistral:latest
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemma-3-27b-it}
      - RELATIONS=${RELATIONS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "python domain_multi_relation_kg_builder.py --all --collection financial_docs --db-path /app/chroma_db --clear"

  kg-ceo:
    build: .
    container_name: kg-builder-ceo
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./:/app/input
      - ./output:/app/output
      - ./chroma_db:/app/chroma_db
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=mistral:latest
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemma-3-27b-it}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "python domain_multi_relation_kg_builder.py ceo --collection financial_docs --db-path /app/chroma_db"

  kg-metrics:
    build: .
    container_name: kg-builder-metrics
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./:/app/input
      - ./output:/app/output
      - ./chroma_db:/app/chroma_db
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=mistral:latest
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemma-3-27b-it}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "python domain_multi_relation_kg_builder.py has_metric --collection financial_docs --db-path /app/chroma_db"

  kg-risks:
    build: .
    container_name: kg-builder-risks
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./:/app/input
      - ./output:/app/output
      - ./chroma_db:/app/chroma_db
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=mistral:latest
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemma-3-27b-it}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "python domain_multi_relation_kg_builder.py faces_risk --collection financial_docs --db-path /app/chroma_db"

  kg-industry:
    build: .
    container_name: kg-builder-industry
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./:/app/input
      - ./output:/app/output
      - ./chroma_db:/app/chroma_db
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=mistral:latest
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemma-3-27b-it}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "python domain_multi_relation_kg_builder.py operates_in --collection financial_docs --db-path /app/chroma_db"

  # ============================================================
  # LEXICAL GRAPHRAG (chunk-based KG with NEXT/PREV traversal)
  # Files: lexical_wrapper_kg.py, lexical_kG_building.py,
  #        lexical_graphrag_system.py, sections_merging_pages.py
  # ============================================================
  lexical-kg-build:
    build: .
    container_name: lexical-kg-builder
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
    command: python lexical_wrapper_kg.py

  lexical-kg-query:
    build: .
    container_name: lexical-kg-query
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral:latest}
      - QUERY=${QUERY:-What is the company revenue?}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "python lexical_graphrag_system.py \"$QUERY\""

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
