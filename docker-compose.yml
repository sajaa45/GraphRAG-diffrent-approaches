services:
  pdf-extractor:
    build: .
    container_name: pdf-text-extractor
    volumes:
      # Mount current directory to /app/input for PDF files
      - ./:/app/input
      # Mount output directory for extracted text
      - ./output:/app/output
      # Mount current directory as samples directory for chunk samples
      - ./:/app/samples
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1

  test-embeddings:
    build: .
    container_name: embedding-tester
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: python test_embedding_models.py

  neo4j:
    image: neo4j:5.15-community
    container_name: neo4j-knowledge-graph
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/Lexical12345
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "Lexical12345", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  knowledge-graph:
    build: .
    container_name: knowledge-graph-builder
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - CLEAR_DB=y
    command: python neo4j_knowledge_graph.py

  graphrag-test:
    build: .
    container_name: graphrag-tester
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=mistral:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python graphrag_system.py

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins: