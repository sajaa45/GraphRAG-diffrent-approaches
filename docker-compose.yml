services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5.15-community
    container_name: neo4j-knowledge-graph
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/Lexical12345
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "Lexical12345", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  parse-pdf:
    build: .
    container_name: pdf-parser
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: python sections_parser_pdf.py /app/input/saudi-aramco-ara-2024-english.pdf --output /app/output/parsed_sections.json

  vector-store:
    build: .
    container_name: vector-store-builder
    depends_on:
      - qdrant
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    command: python chunking_vectorestore_pipeline.py /app/output/parsed_sections.json --collection financial_docs --qdrant-host qdrant --clear


  multi-relation-kg:
    build: .
    container_name: multi-relation-kg-builder
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_MODEL=${BEDROCK_MODEL:-meta.llama3-70b-instruct-v1:0}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - RELATIONS=${RELATIONS:-}
    command: sh -c "python domain_multi_relation_kg_builder.py --all --collection financial_docs --qdrant-host qdrant --clear --source-file saudi-aramco-ara-2024-english.pdf"

  kg-ceo:
    build: .
    container_name: kg-builder-ceo
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_MODEL=${BEDROCK_MODEL:-meta.llama3-70b-instruct-v1:0}
    command: sh -c "python domain_multi_relation_kg_builder.py ceo --collection financial_docs --qdrant-host qdrant"

  kg-metrics:
    build: .
    container_name: kg-builder-metrics
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_MODEL=${BEDROCK_MODEL:-meta.llama3-70b-instruct-v1:0}
    command: sh -c "python domain_multi_relation_kg_builder.py has_metric --collection financial_docs --qdrant-host qdrant"

  kg-risks:
    build: .
    container_name: kg-builder-risks
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_MODEL=${BEDROCK_MODEL:-meta.llama3-70b-instruct-v1:0}
    command: sh -c "python domain_multi_relation_kg_builder.py faces_risk --collection financial_docs --qdrant-host qdrant"

  kg-industry:
    build: .
    container_name: kg-builder-industry
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_MODEL=${BEDROCK_MODEL:-meta.llama3-70b-instruct-v1:0}
      - GROQ_API_KEY=${GROQ_API_KEY}
    command: sh -c "python domain_multi_relation_kg_builder.py operates_in --collection financial_docs --qdrant-host qdrant"

  peers-kg:
    build: .
    container_name: peers-kg-builder
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./:/app/input
      - ./output:/app/output
      - ./data:/app/data
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - MAIN_COMPANY=${MAIN_COMPANY:-}
      - TARGET_SIC=${TARGET_SIC:-}
    command: python peers_kg_builder.py --output-dir /app/output

  graphrag-credit-risk:
    build: .
    container_name: graphrag-credit-risk
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_MODEL=${BEDROCK_MODEL:-meta.llama3-70b-instruct-v1:0}
      - MAIN_COMPANY=${MAIN_COMPANY:-}
      - QUERY=${QUERY:-}
    command: sh -c "if [ -n \"$QUERY\" ]; then python graphrag_credit_risk.py --query \"$QUERY\"; else python graphrag_credit_risk.py --analyze; fi"

  lexical-kg-build:
    build: .
    container_name: lexical-kg-builder
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
    command: python lexical_wrapper_kg.py

  lexical-kg-query:
    build: .
    container_name: lexical-kg-query
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - QUERY=${QUERY:-What is the company revenue?}
    command: sh -c "python lexical_graphrag_system.py \"$QUERY\""

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
