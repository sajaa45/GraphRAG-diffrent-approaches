services:
  neo4j:
    image: neo4j:5.15-community
    container_name: neo4j-knowledge-graph
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/Lexical12345
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "Lexical12345", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  parse-pdf:
    build: .
    container_name: pdf-parser
    volumes:
      - ./:/app/input
      - ./output:/app/output
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: python parse_pdf.py /app/input/saudi-aramco-ara-2024-english.pdf --output /app/output/parsed_sections.json

  vector-store:
    build: .
    container_name: vector-store-builder
    volumes:
      - ./:/app/input
      - ./output:/app/output
      - ./chroma_db:/app/chroma_db
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: python unified_pipeline.py /app/output/parsed_sections.json --collection financial_docs --db-path /app/chroma_db

  query-store:
    build: .
    container_name: vector-store-query
    volumes:
      - ./:/app/input
      - ./output:/app/output
      - ./chroma_db:/app/chroma_db
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - QUERY=${QUERY:-CEO}
    command: sh -c "python query_vector_store_fixed.py \"$$QUERY\" --collection financial_docs --db-path /app/chroma_db --stats"

  build-kg-from-query:
    build: .
    container_name: kg-builder-from-query
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./:/app/input
      - ./output:/app/output
      - ./chroma_db:/app/chroma_db
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=Lexical12345
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2:1b
      - QUERY=${QUERY:-CEO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "python build_kg_from_query.py \"$$QUERY\" --collection financial_docs --db-path /app/chroma_db --clear"

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
